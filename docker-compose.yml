services:
  db:
    image: postgres:16
    container_name: todo_postgres
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass123
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: .
    container_name: todo_api
    ports:
      - 8000:8000
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: